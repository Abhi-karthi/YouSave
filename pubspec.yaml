name: you_save
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.1
  english_words: ^4.0.0
  provider: ^6.1.5
  font_awesome_flutter: ^10.7.0
  wakelock_plus: ^1.5.2
  audioplayers: ^6.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/tick.mp3

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true # This acts as a safety net against transparent backgrounds!

flutter_native_splash:
  color: "#ffffff" # The background color of the loading screen (white)
  image: "assets/splash.png" # Your logo

  # For iOS specifically:
  ios: true
  ios_content_mode: scaleAspectFit # Keeps your logo from stretching weirdly